<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .entity { fill: #ffffff; stroke: #2563eb; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .entityText { font: 700 20px Arial, sans-serif; fill: #1e3a8a; text-anchor: middle; dominant-baseline: middle; }
      .service { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .serviceText { font: 700 19px Arial, sans-serif; fill: #9a3412; text-anchor: middle; dominant-baseline: middle; }
      .process { fill: #ecfeff; stroke: #0891b2; stroke-width: 4; filter: url(#shadow); }
      .processTitle { font: 700 27px Arial, sans-serif; fill: #164e63; text-anchor: middle; }
      .processText { font: 600 20px Arial, sans-serif; fill: #155e75; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .labelBox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 9; }
      .label { font: 500 15px Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text x="700" y="58" class="title" text-anchor="middle">DFD Level 0 - Sistem Presensi SMK</text>
